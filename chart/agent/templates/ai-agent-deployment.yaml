apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rancher-ai-agent
  name: rancher-ai-agent
  namespace: cattle-ai-agent-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rancher-ai-agent
  template:
    metadata:
      labels:
        app: rancher-ai-agent
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
        # If seLinux.enabled is set to true in values.yaml, the container will run as type rancher_aiagent_container_t.
        # Note: https://github.com/rancher/rancher-selinux policy should be installed.
        {{- if .Values.seLinux.enabled }}
        seLinuxOptions:
          type: rancher_aiagent_container_t
        {{- end }}
      serviceAccountName: agent-sa
      volumes:
      - name: tmp-dir
        emptyDir: {}
      - name: cert-dir
        emptyDir: {}
      containers:
      - image: "{{ template "system_default_registry" . }}{{ .Values.aiAgent.image.repository }}:{{ .Values.aiAgent.image.tag }}"
        imagePullPolicy: "{{ .Values.aiAgent.image.pullPolicy }}"
        name: agent
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        env:
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: OPENAI_API_KEY
                optional: true
          - name: OPENAI_URL
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: OPENAI_URL
                optional: true
          - name: OLLAMA_MODEL
            valueFrom:
              configMapKeyRef:
                name: llm-config
                key: OLLAMA_MODEL
                optional: true
          - name: GEMINI_MODEL
            valueFrom:
              configMapKeyRef:
                name: llm-config
                key: GEMINI_MODEL
                optional: true
          - name: OPENAI_MODEL
            valueFrom:
              configMapKeyRef:
                name: llm-config
                key: OPENAI_MODEL
                optional: true
          - name: BEDROCK_MODEL
            valueFrom:
              configMapKeyRef:
                name: llm-config
                key: BEDROCK_MODEL
                optional: true
          - name: OLLAMA_URL
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: OLLAMA_URL
                optional: true
          - name: GOOGLE_API_KEY
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: GOOGLE_API_KEY
                optional: true
          - name: ACTIVE_LLM
            valueFrom:
              configMapKeyRef:
                name: llm-config
                key: ACTIVE_LLM
                optional: true
          - name: LANGFUSE_PUBLIC_KEY
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: LANGFUSE_PUBLIC_KEY
                optional: true
          - name: LANGFUSE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: LANGFUSE_SECRET_KEY
                optional: true
          - name: LANGFUSE_HOST
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: LANGFUSE_HOST
                optional: true
          - name: AWS_BEARER_TOKEN_BEDROCK
            valueFrom:
              secretKeyRef:
                name: llm-secret
                key: AWS_BEARER_TOKEN_BEDROCK
                optional: true
          - name: AWS_REGION
            valueFrom: 
              secretKeyRef:
                name: llm-secret
                key: AWS_REGION
                optional: true
          - name: DB_ENABLED
            value: "{{ .Values.storage.enabled }}"
          - name: DB_CONNECTION_STRING
            value: "{{ .Values.storage.connectionString }}"
          - name: LOG_LEVEL
            value: "{{ .Values.log.level }}"
          - name: INSECURE_SKIP_TLS
            value: "{{ .Values.insecureSkipTls }}"
          - name: LLM_MOCK_ENABLED
            value: "{{ .Values.llmMock.enabled }}"
          - name: LLM_MOCK_URL
            value: "{{ .Values.llmMock.url }}"
        ports:
         - containerPort: 8000
        startupProbe:
          httpGet:
            path: /v1/api/readiness
            port: 8000
          {{ toYaml .Values.probes.startup | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /v1/api/health
            port: 8000
          {{ toYaml .Values.probes.liveness | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /v1/api/readiness
            port: 8000
          {{ toYaml .Values.probes.readiness | nindent 10 }}
        volumeMounts:
        - name: tmp-dir
          mountPath: /tmp
        - name: cert-dir
          mountPath: /cert

