openapi: 3.0.3
info:
  title: Rancher AI Chat API
  description: API for managing chats and messages with tag-based filtering
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:8000
    description: Local development server
  - url: http://0.0.0.0:8080
    description: Production server

paths:
  /chats:
    get:
      summary: List all chats for the current user
      description: Retrieves all chats belonging to the authenticated user with optional sorting
      operationId: list_chats
      tags:
        - Chats
      parameters:
        - name: sort
          in: query
          description: "Sort order for chats. Example: createdAt:asc or createdAt:desc"
          required: false
          schema:
            type: string
            enum: [createdAt:asc, createdAt:desc]
          example: createdAt:desc
      responses:
        '200':
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete all chats for the current user
      description: Deletes all chats and associated messages for the authenticated user
      operationId: delete_chats
      tags:
        - Chats
      responses:
        '204':
          description: All chats deleted successfully
        '400':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No chats found to delete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chats/{chat_id}:
    get:
      summary: Get a chat by ID
      description: Retrieves a chat by its unique identifier.
      operationId: get_chat
      tags:
        - Chats
      parameters:
        - name: chat_id
          in: path
          description: The unique identifier of the chat
          required: true
          schema:
            type: string
            format: uuid
          example: ad924baf-24d7-49a5-84ae-bba3a58218a6
      responses:
        '200':
          description: Chat object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: chat_id is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update a chat by ID
      description: Updates a chat's metadata by its unique identifier.
      operationId: update_chat
      tags:
        - Chats
      parameters:
        - name: chat_id
          in: path
          description: The unique identifier of the chat
          required: true
          schema:
            type: string
            format: uuid
          example: ad924baf-24d7-49a5-84ae-bba3a58218a6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Chat data to update
      responses:
        '200':
          description: Updated chat object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: chat_id or chat_data is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a specific chat
      description: Deletes a specific chat and all associated messages. Only the chat owner can delete it.
      operationId: delete_chat
      tags:
        - Chats
      parameters:
        - name: chat_id
          in: path
          description: The unique identifier of the chat to delete
          required: true
          schema:
            type: string
            format: uuid
          example: ad924baf-24d7-49a5-84ae-bba3a58218a6
      responses:
        '204':
          description: Chat deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: chat_id is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chats/{chat_id}/messages:
    get:
      summary: List messages in a chat
      description: Retrieves all messages for a specific chat, grouped by request ID and sorted chronologically with optional tag filtering
      operationId: list_messages
      tags:
        - Messages
      parameters:
        - name: chat_id
          in: path
          description: The unique identifier of the chat
          required: true
          schema:
            type: string
            format: uuid
          example: ad924baf-24d7-49a5-84ae-bba3a58218a6
        - name: include-tag
          in: query
          description: Select also messages that have these tags
          required: false
          schema:
            type: array
            items:
              type: string
          example: ["important"]
        - name: exclude-tag
          in: query
          description: Select only messages that do not have these tags
          required: false
          schema:
            type: array
            items:
              type: string
          example: ["archived", "spam"]
      responses:
        '200':
          description: List of messages grouped by request ID
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          description: User not found or chat_id missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /complete/ui-tools:
    post:
      summary: Select appropriate UI tools based user input
      description: Uses the LLM to select appropriate UI tools based on the provided context and prompt
      operationId: complete_ui_tools
      tags:
        - UI Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UIToolsRequest'
      responses:
        '200':
          description: List of selected UI tools
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    toolName:
                      type: string
                      description: Name of the UI tool
                    input:
                      type: object
                      description: Input parameters for the UI tool
        '400':
          description: Bad request - tools.name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /llm/{llm_name}/models:
    get:
      summary: Get available models for an LLM provider
      description: Retrieves the list of available models for a specific LLM provider (openai, gemini, bedrock, ollama)
      operationId: get_models
      tags:
        - Configuration
      parameters:
        - name: llm_name
          in: path
          description: The name of the LLM provider
          required: true
          schema:
            type: string
            enum: [openai, gemini, bedrock, ollama]
          example: openai
        - name: url
          in: query
          description: Ollama server URL (required for ollama provider)
          required: false
          schema:
            type: string
          example: http://localhost:11434
        - name: region
          in: query
          description: AWS region (required for bedrock provider, e.g. us-east-1, us-west-2)
          required: false
          schema:
            type: string
          example: us-east-1
        - name: bearerToken
          in: query
          description: AWS bearer token (required for bedrock provider)
          required: false
          schema:
            type: string
          example: token_example...
      responses:
        '200':
          description: List of available models
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: ["gpt-4o", "gpt-4o-mini", "gpt-4", "gpt-3.5-turbo"]
        '400':
          description: Invalid provider or missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Failed to fetch models from provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /settings:
    get:
      summary: Get current agent settings
      description: Retrieves the current configuration settings for the AI agent
      operationId: get_settings
      tags:
        - Configuration
      responses:
        '200':
          description: Current agent settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  storageType:
                    type: string
                    description: Type of storage backend being used
                    example: in-memory
                required:
                  - storageType
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update agent settings
      description: Updates the agent settings stored in the llm-config Kubernetes secret
      operationId: update_settings
      tags:
        - Configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                description: Updated settings (secret data)
                additionalProperties:
                  type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - user does not have permission to update settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Chat:
      type: object
      description: A chat session
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the chat
        userId:
          type: string
          description: ID of the user who owns the chat
        name:
          type: string
          description: Display name of the chat
        createdAt:
          type: integer
          description: Unix timestamp of when the chat was created
      required:
        - id
        - userId
        - name
        - createdAt
      example:
        id: ad924baf-24d7-49a5-84ae-bba3a58218a6
        userId: PIPPO
        name: Chat 1
        createdAt: 1767638974

    Message:
      type: object
      description: A message in a chat
      properties:
        chatId:
          type: string
          format: uuid
          description: Unique identifier of the chat containing this message
        role:
          type: string
          enum:
            - user
            - llm
            - mcp
            - agent
          description: Role of who sent the message. 'agent' is aggregated response from llm/mcp
        message:
          type: string
          description: The message content. For agent role, multiple messages are concatenated with newlines
        context:
          oneOf:
            - type: object
              description: Additional context data as JSON object
            - type: string
              description: Empty string for agent messages
        labels:
          type: object
          nullable: true
          description: Labels as JSON object with key-value pairs, null for agent messages
          example: '{"summary": "Chat summary"}'
        tags:
          oneOf:
            - type: string
              description: JSON array string of tags
              example: '["urgent", "bug"]'
            - type: object
              description: Tags as JSON object
        tools:
          type: array
          nullable: true
          description: UI tools to be dispatched with the agent response (Assistant message only)
          items:
            type: object
            properties:
              toolName:
                type: string
                description: Name of the UI tool
              input:
                type: object
                description: Input parameters for the UI tool
        createdAt:
          type: integer
          description: Unix timestamp of when the message was created
      required:
        - chatId
        - role
        - message
        - context
        - tags
        - createdAt
      example:
        chatId: ad924baf-24d7-49a5-84ae-bba3a58218a6
        role: user
        message: Chat 1 - Message 1
        context: "{ 'cluster: 'local'}"
        labels: '{"summary": "Chat summary"}'
        tags: "['welcome']"
        tools: "[ { 'toolName': 'my_tool', 'input': { 'param1': 'value1' } } ]"
        createdAt: 1767638974

    Error:
      type: object
      description: Error response
      properties:
        message:
          type: string
          description: Error message
      required:
        - message
      example:
        message: userId not found

    UIToolsConfig:
      type: object
      description: Configuration for UI tools selection
      properties:
        name:
          type: string
          description: Name of the UI tools configuration
        tools:
          type: array
          nullable: true
          description: Optional list of specific tools to consider
          items:
            type: string
      required:
        - name
      example:
        name: "default_tools"
        tools: ["tool1", "tool2"]

    UIToolsRequest:
      type: object
      description: Request model for UI tools selection
      properties:
        prompt:
          type: string
          description: The system prompt for tool selection
        tools:
          $ref: '#/components/schemas/UIToolsConfig'
        context:
          type: array
          description: Context information for tool selection
          items:
            type: object
      required:
        - prompt
        - tools
        - context
      example:
        prompt: "Select the most appropriate tools for this context"
        tools:
          name: "default_tools"
          tools: null
        context: [{"key": "value"}]

    SettingsUpdate:
      type: object
      description: Configuration settings for the AI agent
      properties:
        OPENAI_API_KEY:
          type: string
          description: OpenAI API key
        OPENAI_URL:
          type: string
          description: OpenAI API base URL
        SYSTEM_PROMPT:
          type: string
          description: System prompt for the agent
        OLLAMA_MODEL:
          type: string
          description: Model to use with Ollama
        GEMINI_MODEL:
          type: string
          description: Model to use with Gemini
        OPENAI_MODEL:
          type: string
          description: Model to use with OpenAI
        BEDROCK_MODEL:
          type: string
          description: Model to use with Bedrock
        OLLAMA_URL:
          type: string
          description: URL to Ollama server
        GOOGLE_API_KEY:
          type: string
          description: Google API key for Gemini
        ACTIVE_LLM:
          type: string
          enum: [openai, gemini, bedrock, ollama]
          description: Currently active LLM provider
        LANGFUSE_HOST:
          type: string
          description: Langfuse server host
        LANGFUSE_PUBLIC_KEY:
          type: string
          description: Langfuse public key
        LANGFUSE_SECRET_KEY:
          type: string
          description: Langfuse secret key
        AWS_REGION:
          type: string
          description: AWS region for Bedrock
        AWS_BEARER_TOKEN_BEDROCK:
          type: string
          description: AWS bearer token for Bedrock
      example:
        ACTIVE_LLM: openai
        OPENAI_API_KEY: sk-...
        OPENAI_MODEL: gpt-4o

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: R_SESS
      description: Rancher session cookie for authentication

security:
  - cookieAuth: []

tags:
  - name: Chats
    description: Chat management operations
  - name: Messages
    description: Message retrieval and filtering
  - name: LLM
    description: Large Language Model operations
  - name: UI Tools
    description: UI tools selection and management
  - name: Configuration
    description: LLM and agent configuration management
